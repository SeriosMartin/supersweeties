name: Build and deploy Python project to Azure Function App - sweetsdata

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_760910F6DB3B4DD9BB79A6B0901660E3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_298BFD3B1B854FE5B66C26CB9C6D28B1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_83948034E61D40DFB891C3AF95FB9EA3 }}

      - name: Zip and deploy via Azure CLI
        run: |
          zip -r deploy.zip . --exclude "*.git*" --exclude "*__pycache__*" --exclude "*.venv*"
          az functionapp deployment source config-zip \
            --resource-group sweetsdata_group \
            --name sweetsdata \
            --src deploy.zip \
            --build-remote true
